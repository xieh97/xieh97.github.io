name: quarto-publish.yml
run-name: Quarto Publish

on:
  pull_request:
    types:
      - closed
    branches:
      - master
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: write
  pages: write

concurrency:
  group: "quarto-pages"
  cancel-in-progress: false

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2
      - name: Render and Publish
        uses: quarto-dev/quarto-actions/publish@v2
        with:
          target: gh-pages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}